server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Forward all API calls to the backend container.
    # "backend" is the service name from docker-compose.yml -
    # Docker's internal DNS resolves it to the backend container.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Support React Router client-side routing:
    # any unknown path falls back to index.html instead of a raw 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
