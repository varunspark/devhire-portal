spring.application.name=devhire-portal

# ---- MySQL ----
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:devhire_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT ----
jwt.secret=${JWT_SECRET:devhire-super-secret-key-change-this-in-production-min-256-bits}
jwt.expiration=86400000

# ---- Server ----
server.port=${SERVER_PORT:8080}

# ---- Swagger ----
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ---- Logging ----
logging.level.org.springframework.security=INFO
